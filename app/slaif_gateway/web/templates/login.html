{% extends "base.html" %}
{% from "_brand.html" import slaif_brand %}

{% block title %}Admin Login{% endblock %}

{% block body %}
<section class="auth-panel" aria-labelledby="login-heading">
  <div class="auth-header">
    {{ slaif_brand(lockup_class="brand-lockup auth-brand", logo_class="brand-logo auth-logo") }}
    <h1 id="login-heading">Admin Login</h1>
  </div>

  {% if error %}
  <p class="form-error" role="alert">{{ error }}</p>
  {% endif %}

  <form method="post" action="/admin/login" class="form-stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required autofocus>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
