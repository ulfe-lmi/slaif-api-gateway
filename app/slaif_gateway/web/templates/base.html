<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SLAIF Gateway Admin{% endblock %}</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css">
  </head>
  <body>
    <main class="page-shell">
      {% if admin_status_message %}
      <div class="admin-flash admin-flash-{{ admin_status_message.level }}" role="status">
        {{ admin_status_message.text }}
      </div>
      {% endif %}
      {% block body %}{% endblock %}
    </main>
  </body>
</html>
