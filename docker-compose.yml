services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slaif_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-slaif}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slaif}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_HOST_PORT:-1025}:1025"
      - "${MAILPIT_WEB_HOST_PORT:-8025}:8025"

  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    command:
      - gunicorn
      - slaif_gateway.main:app
      - --worker-class
      - uvicorn.workers.UvicornWorker
      - --bind
      - 0.0.0.0:8000
      - --workers
      - ${WEB_CONCURRENCY:-2}
      - --timeout
      - "120"

  worker:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    command:
      - celery
      - -A
      - slaif_gateway.workers.celery_app:celery_app
      - worker
      - --loglevel=INFO

  scheduler:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - slaif_gateway.workers.celery_app:celery_app
      - beat
      - --loglevel=INFO

  nginx:
    image: nginx:1.27-alpine
    profiles: ["nginx"]
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/slaif-api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
