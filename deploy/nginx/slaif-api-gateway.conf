upstream slaif_api_gateway {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # TLS certificates, real domains, and public network controls are deployment-specific.
    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    location /v1/ {
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://slaif_api_gateway;
    }

    location /admin/ {
        proxy_pass http://slaif_api_gateway;
    }

    location = /admin {
        proxy_pass http://slaif_api_gateway;
    }

    location = /healthz {
        proxy_pass http://slaif_api_gateway;
    }

    # Keep readiness internal or allowlisted in production.
    location = /readyz {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://slaif_api_gateway;
    }

    # Metrics should not be publicly exposed. Replace this with an internal
    # network or explicit allowlist if Prometheus must scrape through Nginx.
    location = /metrics {
        deny all;
        return 403;
    }

    location / {
        return 404;
    }
}
